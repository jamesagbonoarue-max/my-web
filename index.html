<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1e1e2e;
  }

  .calculator {
    width: 320px;
    background: #2a2a3d;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  .display {
    background: #1e1e2e;
    color: #fff;
    font-size: 2.5rem;
    text-align: right;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
    min-height: 80px;
    overflow-x: auto;
    word-wrap: break-word;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  button {
    border: none;
    border-radius: 15px;
    padding: 20px;
    font-size: 1.3rem;
    cursor: pointer;
    transition: 0.1s;
    background: #3b3b55;
    color: #fff;
  }

  button:hover {
    opacity: 0.8;
  }

  button:active {
    transform: scale(0.95);
  }

  .operator {
    background: #ff9500;
    color: #fff;
  }
  

  .function {
    background: #5f5f7a;
    color: #fff;
  }

  .equal {
    background: #34c759;
    grid-column: span 2;
  }

  .zero {
    grid-column: span 2;
  }

  @media (max-width: 400px) {
    .calculator {
      width: 90%;
    }
  }
</style>
</head>
<body>

<div class="calculator">
  <div class="display" id="display">0</div>
  <div class="buttons">
    <button class="function" onclick="clearDisplay()">AC</button>
    <button class="function" onclick="deleteLast()">DEL</button>
    <button class="function" onclick="appendValue('%')">%</button>
    <button class="operator" onclick="appendValue('/')">÷</button>

    <button onclick="appendValue('7')">7</button>
    <button onclick="appendValue('8')">8</button>
    <button onclick="appendValue('9')">9</button>
    <button class="operator" onclick="appendValue('*')">×</button>

    <button onclick="appendValue('4')">4</button>
    <button onclick="appendValue('5')">5</button>
    <button onclick="appendValue('6')">6</button>
    <button class="operator" onclick="appendValue('-')">−</button>

    <button onclick="appendValue('1')">1</button>
    <button onclick="appendValue('2')">2</button>
    <button onclick="appendValue('3')">3</button>
    <button class="operator" onclick="appendValue('+')">+</button>

    <button class="zero" onclick="appendValue('0')">0</button>
    <button onclick="appendValue('.')">.</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>
</div>

<script>
  const display = document.getElementById('display');
  let currentInput = '0';

  function updateDisplay() {
    display.textContent = currentInput;
  }

  function appendValue(val) {
    if (currentInput === '0' && !['+', '-', '*', '/', '%', '.'].includes(val)) {
      currentInput = val;
    } else {
      currentInput += val;
    }
    updateDisplay();
  }

  function clearDisplay() {
    currentInput = '0';
    updateDisplay();
  }

  function deleteLast() {
    currentInput = currentInput.slice(0, -1);
    if (currentInput === '') currentInput = '0';
    updateDisplay();
  }

  function calculate() {
    try {
      let expression = currentInput.replace(/×/g, '*').replace(/÷/g, '/');
      let result = eval(expression);
      
      if (!isFinite(result)) {
        currentInput = 'Error';
      } else {
        currentInput = parseFloat(result.toFixed(10)).toString();
      }
    } catch {
      currentInput = 'Error';
    }
    updateDisplay();
  }

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    if ((e.key >= '0' && e.key <= '9') || ['+', '-', '*', '/', '.', '%'].includes(e.key)) {
      appendValue(e.key);
    }
    if (e.key === 'Enter') calculate();
    if (e.key === 'Backspace') deleteLast();
    if (e.key === 'Escape') clearDisplay();
  });
</script>

</body>
</html>
